name: Android OTA Deployment

on:
  push:
    branches: [ "android-ota-deployment" ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prepare Config for Production
        run: |
          sed -i 's|http://localhost:8000|https://orderlink-delivery-api-latest.onrender.com|g' frontend/lib/core/config.dart
          
          echo "Konfiguration auf Production umgestellt:"
          grep "static const String baseUrl" frontend/lib/core/config.dart

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build APK
        run: |
          cd frontend
          flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK and Notify Discord
        run: |
          APK_PATH=$(find frontend/build/app/outputs/flutter-apk/ -name "*release.apk" | head -n 1)
          FILENAME=$(basename "$APK_PATH")
          
          echo "Uploading $FILENAME to transfer.sh..."
          DOWNLOAD_URL=$(curl --upload-file "$APK_PATH" "https://transfer.sh/$FILENAME")
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"content\": \"🚀 **Neuer Android-Build verfügbar!** (Build #${{ github.run_number }})\n\nLade sie hier direkt herunter:\n🔗 **$DOWNLOAD_URL**\n\n*(Link ist 14 Tage gültig)* @everyone\"
               }" \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "❌ **Frontend Build fehlgeschlagen!** Bitte check die GitHub Actions Logs."}' \
               ${{ secrets.DISCORD_WEBHOOK }}