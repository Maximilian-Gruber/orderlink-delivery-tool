name: Orderlink CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest with Coverage
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          export DB_INIT=false
          python -m pytest --cov=app/routers --cov-report=xml --cov-report=term-missing app/tests/

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/orderlink-delivery-api:latest
            ${{ secrets.DOCKER_USERNAME }}/orderlink-delivery-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend:
    needs: [test, check-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/keystore.jks

      - name: Prepare Config for Production
        run: sed -i 's|http://localhost:8000|https://orderlink-delivery-api-latest.onrender.com|g' frontend/lib/core/config.dart

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Set Flutter version
        run: |
          cd frontend
          sed -i "s/^version:.*/version: 0.1.0+${{ github.run_number }}/" pubspec.yaml

      - name: Build APK
        run: |
          cd frontend
          flutter build apk --release --build-number=${{ github.run_number }} --build-name=0.1.0.${{ github.run_number }}
        env:
          ANDROID_KEYSTORE_PATH: keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: mv frontend/build/app/outputs/flutter-apk/app-release.apk frontend/build/app/outputs/flutter-apk/orderlink-delivery-0.1.0.${{ github.run_number }}.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-0.1.0.${{ github.run_number }}
          files: frontend/build/app/outputs/flutter-apk/orderlink-delivery-0.1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/dev-0.1.0.${{ github.run_number }}"
          AVATAR_URL="https://github.com/${{ github.actor }}.png"
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "username": "Orderlink Build Bot",
                 "avatar_url": "https://raw.githubusercontent.com/fortawesome/Font-Awesome/6.x/svgs/solid/rocket.svg",
                 "embeds": [{
                   "title": "🚀 Neuer Android Build verfügbar!",
                   "description": "Ein neuer Dev-Build wurde erfolgreich erstellt.",
                   "color": 5814783,
                   "fields": [
                     { "name": "Version", "value": "0.1.0.${{ github.run_number }}", "inline": true },
                     { "name": "Author", "value": "'"$COMMIT_AUTHOR"'", "inline": true },
                     { "name": "Letzter Commit", "value": "```'"$COMMIT_MSG"'```" },
                     { "name": "Download APK", "value": "🔗 [Hier herunterladen]('"$RELEASE_URL"')" }
                   ],
                   "footer": { "text": "Orderlink CI/CD Pipeline", "icon_url": "'"$AVATAR_URL"'" },
                   "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}